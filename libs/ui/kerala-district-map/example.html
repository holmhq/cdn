<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>kerala-district-map example</title>
  <script type="module" src="./src/kerala-district-map.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #0ea5e9;
      --bg: #eef8f4;
      --bg-2: #dbeafe;
      --card: rgba(255, 255, 255, 0.78);
      --ink: #102033;
      --muted: #64748b;
      --border: rgba(15, 118, 110, 0.16);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #071417;
        --bg-2: #0f172a;
        --card: rgba(15, 23, 42, 0.78);
        --ink: #e5f7f4;
        --muted: #9fb3c8;
        --border: rgba(45, 212, 191, 0.18);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 22%, transparent), transparent 34rem),
        linear-gradient(135deg, var(--bg), var(--bg-2));
    }

    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 30px 0 42px;
    }

    header { max-width: 820px; margin-bottom: 22px; }
    h1 { margin: 0; font-size: clamp(2rem, 5vw, 4.6rem); line-height: 1; letter-spacing: -0.055em; }
    p { color: var(--muted); line-height: 1.65; }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
      gap: 18px;
      align-items: start;
    }

    .stage,
    .panel {
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
      backdrop-filter: blur(18px) saturate(1.35);
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: 760px;
      padding: clamp(18px, 4vw, 42px);
    }

    kerala-district-map {
      width: min(100%, 680px);
      --kerala-district-map-overlay-background: color-mix(in srgb, var(--card) 76%, transparent);
      --kerala-district-map-popup-background: color-mix(in srgb, var(--card) 84%, transparent);
      --kerala-district-map-overlay-color: var(--ink);
      --kerala-district-map-popup-color: var(--ink);
      --kerala-district-map-popup-muted-color: var(--muted);
    }

    .panel { padding: 16px; }
    .panel h2 { margin: 0 0 10px; font-size: 1rem; }
    pre {
      min-height: 240px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: color-mix(in srgb, var(--card) 70%, transparent);
      color: var(--ink);
      white-space: pre-wrap;
    }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
      .stage { min-height: 640px; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Kerala district map</h1>
      <p>Dependency-free custom element with district-keyed data, Malayalam labels, keyboard selection, and frosted overlays.</p>
    </header>

    <section class="grid">
      <div class="stage">
        <kerala-district-map
          id="map"
          locale="ml"
          labels="id"
          size="560"
          tint-color="#0ea5e9"
          heading="കേരള മഴ"
          subheading="സാമ്പിൾ മൺസൂൺ സൂചിക"
          legend="gradient"
          legend-title="മഴ"
          value-suffix=" mm"
          selected-district="ernakulam"
          font-en="baloo-chettan-2"
          font-ml="baloo-chettan-2"
          load-google-fonts
        ></kerala-district-map>
      </div>

      <aside class="panel">
        <h2>Last event</h2>
        <pre id="event-log">Select or hover a district.</pre>
      </aside>
    </section>
  </main>

  <script type="module">
    const data = {
      kasaragod: { value: 312, rank: '#8', zone: 'North' },
      kannur: { value: 348, rank: '#5', zone: 'North' },
      wayanad: { value: 414, rank: '#1', zone: 'High range' },
      kozhikode: { value: 362, rank: '#4', zone: 'North coast' },
      malappuram: { value: 331, rank: '#7', zone: 'Central' },
      palakkad: { value: 226, rank: '#14', zone: 'Gap' },
      thrissur: { value: 284, rank: '#11', zone: 'Central' },
      ernakulam: { value: 292, rank: '#10', zone: 'Metro' },
      idukki: { value: 405, rank: '#2', zone: 'High range' },
      kottayam: { value: 338, rank: '#6', zone: 'Midland' },
      alappuzha: { value: 276, rank: '#12', zone: 'Backwaters' },
      pathanamthitta: { value: 388, rank: '#3', zone: 'Forest edge' },
      kollam: { value: 302, rank: '#9', zone: 'South coast' },
      thiruvananthapuram: { value: 252, rank: '#13', zone: 'Capital' }
    };

    const map = document.querySelector('#map');
    const log = document.querySelector('#event-log');
    map.setData(data);

    for (const type of ['district-hover', 'district-leave', 'district-select']) {
      map.addEventListener(type, (event) => {
        log.textContent = `${type}\n${JSON.stringify(event.detail, null, 2)}`;
      });
    }
  </script>
</body>
</html>
